services:
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: smartliftrentals
      POSTGRES_USER: smartlift
      POSTGRES_PASSWORD: smartlift
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_USERNAME: backend
      MQTT_PASSWORD: backend123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-in-dev
      CORS_ORIGINS: http://localhost:5174,http://127.0.0.1:5174
    depends_on:
      - postgres
      - mosquitto
      - redis
    ports:
      - "8001:8000"
    command: sh -c "uv sync --all-groups && uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000 || sleep infinity"

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: smartliftrentals
      POSTGRES_USER: smartlift
      POSTGRES_PASSWORD: smartlift
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mosquitto:
    build:
      context: ./broker/mosquitto
      dockerfile: Dockerfile.dev
    environment:
      MOSQUITTO_USERNAME: backend
      MOSQUITTO_PASSWORD: backend123
    ports:
      - "1884:1883"
    volumes:
      - ./broker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  frontend-dev:
    image: node:20-alpine
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://backend-dev:8000
    depends_on:
      - backend-dev
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres-data:
  mosquitto-data:
  mosquitto-log:
