name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: smartliftrentals
          POSTGRES_USER: smartlift
          POSTGRES_PASSWORD: smartlift
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartlift -d smartliftrentals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: smartliftrentals
      POSTGRES_USER: smartlift
      POSTGRES_PASSWORD: smartlift
      MQTT_BROKER_HOST: 127.0.0.1
      MQTT_BROKER_PORT: 1883
      MQTT_USERNAME: backend
      MQTT_PASSWORD: backend123
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v3
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --all-groups
      - name: Lint backend
        working-directory: backend
        run: uv run python -m compileall app tests
      - name: Test backend
        working-directory: backend
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build
